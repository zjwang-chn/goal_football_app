name: 每日数据清理与备份

on:

  workflow_dispatch:          # 保留手动触发

jobs:
  daily-process:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # ===========================================
      # 处理 /data 文件夹
      # ===========================================
      - name: 处理 /data 文件夹
        run: |
          cd data
          
          THREE_DAYS_AGO=$(date -d '3 days ago' +%Y%m%d)
          echo "3天前日期: $THREE_DAYS_AGO"
          
          for file in analysis_output_[0-9]*.json; do
            if [[ -f "$file" ]]; then
              filename=$(basename "$file")
              date_part=$(echo "$filename" | sed -n 's/analysis_output_\([0-9]\{8\}\).*/\1/p')
              
              if [[ -n "$date_part" && "$date_part" -lt "$THREE_DAYS_AGO" ]]; then
                echo "删除文件: $file (日期: $date_part)"
                rm -f "$file"
              fi
            fi
          done

      # ===========================================
      # 处理 /HisData 文件夹
      # ===========================================
      - name: 处理 /HisData 文件夹
        run: |
          cd HisData
          
          # 遍历所有条目，找出子文件夹
          for entry in */; do
            # 检查是否是目录（以 / 结尾的就是目录）
            if [[ -d "$entry" ]]; then
              # 去掉末尾的 /
              folder_name="${entry%/}"
              echo "找到子文件夹: $folder_name"
              
              # 添加到 Git
              git add "$folder_name"
              
              # 提交
              git commit -m "Backup: $folder_name" 2>/dev/null || echo "文件夹 $folder_name 无变更，跳过提交"
              
              # 推送（忽略错误，继续执行）
              git push origin HEAD 2>/dev/null || echo "推送失败或无需推送"
              
              # 删除本地文件夹
              echo "删除本地文件夹: $folder_name"
              rm -rf "$folder_name"
              
              echo "处理完成: $folder_name"
            fi
          done

      # ===========================================
      # 提交并推送
      # ===========================================
      - name: 提交并推送更改
        run: |
          git add -A
          git status
          git commit -m "Cleanup: 每日清理任务 - $(date +%Y-%m-%d)" 2>/dev/null || echo "无变更需要提交"
          git push origin HEAD || echo "推送失败"
